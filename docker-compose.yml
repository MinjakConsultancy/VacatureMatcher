services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: vacature
      POSTGRES_PASSWORD: vacature
      POSTGRES_DB: vacature
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/migrations/002_api_jobs.sql:/docker-entrypoint-initdb.d/02-api_jobs.sql:ro
      - ./db/migrations/003_vacancy_user_flags.sql:/docker-entrypoint-initdb.d/03-vacancy_user_flags.sql:ro
      - ./db/migrations/004_scrape_sources.sql:/docker-entrypoint-initdb.d/04-scrape_sources.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vacature -d vacature"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: web/backend/Dockerfile
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://vacature:vacature@postgres:5432/vacature
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: ikwerk-vacatures
      RAG_INDEX_DIR: /data/rag-index
      API_ADMIN_TOKEN: ${API_ADMIN_TOKEN:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-600}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TIMEOUT: ${OPENAI_TIMEOUT:-600}
      SCRAPE_STAGING_DIR: ${SCRAPE_STAGING_DIR:-/tmp/vacature-scrape}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - rag_index:/data/rag-index:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: web/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://vacature:vacature@postgres:5432/vacature
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: ikwerk-vacatures
      RAG_INDEX_DIR: /data/rag-index
      IKWERK_EMAIL: ${IKWERK_EMAIL:-}
      IKWERK_PASSWORD: ${IKWERK_PASSWORD:-}
      IKWERK_PLAYWRIGHT_PROFILE: /data/ikwerk-playwright-profile
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-600}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TIMEOUT: ${OPENAI_TIMEOUT:-600}
      SCRAPE_STAGING_DIR: ${SCRAPE_STAGING_DIR:-/tmp/vacature-scrape}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - rag_index:/data/rag-index:rw
      - ikwerk_profile:/data/ikwerk-playwright-profile:rw
      - ./.env:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: web/frontend/Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
  rag_index:
  ikwerk_profile:
